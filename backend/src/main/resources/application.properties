spring.application.name=ems

# Database (reads from environment variables, with safe local defaults)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ems_db}
spring.datasource.username=${DB_USERNAME:aafiq}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false